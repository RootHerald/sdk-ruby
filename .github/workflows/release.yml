name: Release

# RubyGems trusted publishing via OIDC — no API key required.
# Configure a trusted publisher at https://rubygems.org/profile/oidc/pending_trusted_publishers
# before this workflow can publish for the first time.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - run: bundle exec rspec

      - uses: rubygems/release-gem@v1

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
